<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </linearGradient>
    <radialGradient id="spark" cx="85%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#ff7a18" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff7a18" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Фон -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#spark)"/>

  <!-- Сетка -->
  <g stroke="#2a2a2a" stroke-width="1">
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="510" x2="1200" y2="510"/>
  </g>

  <!-- Логотип V с молотком (слева) -->
  <g transform="translate(100, 220) scale(1.8)">
    <path d="M18 22 L50 82 L82 22" stroke="#f5f5f0" stroke-width="10" fill="none" stroke-linecap="square"/>
    <path d="M70 18 L94 18" stroke="#ff7a18" stroke-width="10" fill="none" stroke-linecap="square"/>
    <circle cx="96" cy="18" r="3" fill="#ff7a18"/>
  </g>

  <!-- Текст -->
  <text x="380" y="290" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="120" font-weight="800" fill="#f5f5f0" letter-spacing="-4">
    VERS<tspan fill="#ff7a18">TAK</tspan>
  </text>
  <text x="380" y="370" font-family="'Inter', 'Helvetica', sans-serif" font-size="38" font-weight="600" fill="#f5f5f0">
