<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Gemini Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --sidebar: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-bright: #f0f6fc;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --code-bg: #010409;
            --user-msg: #1f2937;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        #sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 700;
            font-size: 16px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-new-chat {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
            line-height: 1;
        }

        .btn-new-chat:hover { background: #21262d; border-color: var(--accent); color: var(--accent); }

        .sidebar-title {
            padding: 15px 20px 5px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: #484f58;
            letter-spacing: 1px;
        }

        #skills-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .skill-item {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            color: #8b949e;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2px;
        }

        .skill-item:hover { background: #21262d; color: var(--text-bright); }

        .skill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

        /* ── Main Chat ── */
        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .message-row {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 850px;
            margin: 0 auto;
            width: 100%;
            font-size: 15px;
            line-height: 1.6;
        }

        .message.user {
            color: var(--text-bright);
            font-weight: 600;
            background: var(--user-msg);
            padding: 12px 20px;
            border-radius: 12px;
            align-self: flex-end;
            max-width: fit-content;
        }

        .message.ai {
            color: var(--text);
        }

        /* Markdown Styles */
        .message.ai pre {
            background: var(--code-bg);
            padding: 16px;
            border-radius: 8px;
            margin: 12px 0;
            overflow-x: auto;
            border: 1px solid var(--border);
            position: relative;
        }

        .message.ai pre:hover .copy-btn { opacity: 1; }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #21262d;
            border: 1px solid var(--border);
            color: #8b949e;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .copy-btn:hover { background: #30363d; color: #fff; }

        .message.ai code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            background: rgba(110, 118, 129, 0.4);
            padding: 0.2em 0.4em;
            border-radius: 4px;
        }

        .message.ai pre code { background: transparent; padding: 0; }

        /* ── Input ── */
        #input-area {
            padding: 20px 40px 30px;
            background: var(--bg);
        }

        .input-wrapper {
            max-width: 850px;
            margin: 0 auto;
            position: relative;
            background: #161b22;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px 50px 12px 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: border-color 0.2s;
            display: flex;
            align-items: flex-end;
        }

        .input-wrapper:focus-within { border-color: var(--accent); }

        #user-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-bright);
            font-size: 15px;
            outline: none;
            resize: none;
            min-height: 24px;
            max-height: 300px;
            font-family: inherit;
            padding-bottom: 2px;
        }

        .btn-send {
            position: absolute;
            right: 12px;
            bottom: 12px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #000;
        }

        .btn-send:hover { background: var(--accent-hover); transform: scale(1.05); }
        .btn-send:disabled { background: #30363d; color: #8b949e; cursor: not-allowed; transform: none; }

        .status-info {
            max-width: 850px;
            margin: 0 auto 8px;
            font-size: 12px;
            color: #8b949e;
            display: flex;
            justify-content: space-between;
        }

        .typing-dot {
            display: inline-block;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            margin-left: 4px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.5); }
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #484f58; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">
            <div class="logo">⚡ Gemini Studio</div>
            <button class="btn-new-chat" onclick="newChat()" title="Новый чат">+</button>
        </div>
        <div class="sidebar-title">Мои скиллы</div>
        <div id="skills-list">
            <div class="panel-empty" style="padding: 20px; font-size: 12px; color: #484f58;">Загрузка скиллов...</div>
        </div>
    </div>
    <div id="chat-container">
        <div id="messages">
            <div class="message-row">
                <div class="message ai">
                    Привет, Павел! Система готова к работе. Чем займемся?
                </div>
            </div>
        </div>
        <div id="input-area">
            <div class="status-info">
                <span id="status">Подключение...</span>
                <span id="model-name">Gemini 3 Pro</span>
            </div>
            <div class="input-wrapper">
                <textarea id="user-input" placeholder="Введите сообщение..." rows="1"></textarea>
                <button class="btn-send" id="btn-send" onclick="sendMessage()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
                return hljs.highlightAuto(code).value;
            },
            breaks: true
        });

        let ws;
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('user-input');
        const status = document.getElementById('status');
        const btnSend = document.getElementById('btn-send');

        function connect() {
            ws = new WebSocket(`ws://${location.host}/ws`);
            ws.onopen = () => { status.textContent = 'Подключено'; status.style.color = '#4ade80'; };
            ws.onclose = () => { status.textContent = 'Отключено. Переподключение...'; status.style.color = '#f87171'; setTimeout(connect, 2000); };
            ws.onmessage = handleMessage;
        }

        let currentAiMessage = null;
        let rawContent = "";

        function handleMessage(event) {
            const data = JSON.parse(event.data);
            if (data.type === 'text') {
                if (!currentAiMessage) {
                    const row = document.createElement('div');
                    row.className = 'message-row';
                    currentAiMessage = document.createElement('div');
                    currentAiMessage.className = 'message ai';
                    row.appendChild(currentAiMessage);
                    messagesDiv.appendChild(row);
                }
                rawContent += data.content;
                currentAiMessage.innerHTML = marked.parse(rawContent) + '<span class="typing-dot"></span>';
                addCopyButtons(currentAiMessage);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            } else if (data.type === 'status' && data.content === 'done') {
                const dots = currentAiMessage?.querySelector('.typing-dot');
                if (dots) dots.remove();
                currentAiMessage = null;
                rawContent = "";
                status.textContent = 'Готов к работе';
                status.style.color = '#8b949e';
                input.disabled = false;
                btnSend.disabled = false;
                input.focus();
            }
        }

        function sendMessage() {
            const text = input.value.trim();
            if (!text || input.disabled) return;

            const row = document.createElement('div');
            row.className = 'message-row';
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.textContent = text;
            row.appendChild(userMsg);
            messagesDiv.appendChild(row);

            ws.send(JSON.stringify({ type: 'message', content: text }));
            
            input.value = '';
            input.style.height = 'auto';
            input.disabled = true;
            btnSend.disabled = true;
            status.textContent = 'Gemini думает...';
            status.style.color = '#58a6ff';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function newChat() {
            messagesDiv.innerHTML = '<div class="message-row"><div class="message ai">Привет, Павел! Новый чат начат. Чем могу помочь?</div></div>';
            input.value = '';
            input.disabled = false;
            btnSend.disabled = false;
            status.textContent = 'Готов к работе';
        }

        input.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        };

        input.oninput = () => {
            input.style.height = 'auto';
            input.style.height = input.scrollHeight + 'px';
        };

        function addCopyButtons(container) {
            container.querySelectorAll('pre').forEach(pre => {
                if (pre.querySelector('.copy-btn')) return;
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.textContent = 'Copy';
                btn.onclick = () => {
                    const code = pre.querySelector('code').innerText;
                    navigator.clipboard.writeText(code);
                    btn.textContent = 'Copied!';
                    setTimeout(() => btn.textContent = 'Copy', 2000);
                };
                pre.appendChild(btn);
            });
        }

        async function loadSkills() {
            try {
                const response = await fetch('/api/skills');
                const skills = await response.json();
                const list = document.getElementById('skills-list');
                list.innerHTML = '';
                
                if (skills.length === 0) {
                    list.innerHTML = '<div style="padding: 20px; font-size: 11px; color: #484f58;">Скиллы не найдены</div>';
                    return;
                }

                skills.sort((a,b) => a.name.localeCompare(b.name)).forEach(skill => {
                    const item = document.createElement('div');
                    item.className = 'skill-item';
                    item.innerHTML = `<div class="skill-dot" style="background: ${skill.color}"></div><span>${skill.name}</span>`;
                    item.onclick = () => {
                        input.value = `запусти скилл ${skill.name}`;
                        input.focus();
                        input.style.height = 'auto';
                        input.style.height = input.scrollHeight + 'px';
                    };
                    list.appendChild(item);
                });
            } catch (e) {
                document.getElementById('skills-list').innerHTML = '<div style="padding: 20px; font-size: 11px; color: #484f58;">Ошибка загрузки</div>';
            }
        }

        connect();
        loadSkills();
    </script>
</body>
</html>
