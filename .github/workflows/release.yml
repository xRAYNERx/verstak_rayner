name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            args: --win --x64
          - os: ubuntu-22.04
            platform: linux
            args: --linux --x64
          - os: macos-13
            platform: mac
            args: --mac --x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python (needed for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Linux: системные зависимости для Electron + native modules
      - name: Install Linux system deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsecret-1-dev \
            libgtk-3-dev \
            libnotify-dev \
            libnss3-dev \
            libxss1 \
            libasound2-dev \
            rpm \
            libarchive-tools \
            build-essential

      # macOS: Xcode command line tools уже установлены на runner
      # Windows: windows-latest уже имеет Visual Studio Build Tools

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -o better-sqlite3,@homebridge/node-pty-prebuilt-multiarch
        env:
          npm_config_python: python3

      - name: Type check
        run: npm run type

      - name: Build renderer + main
        run: npm run build

      - name: Package
        run: npx electron-builder ${{ matrix.args }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release artifacts
        shell: bash
        run: ls -la release/ 2>/dev/null || echo "no release dir"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: verstak-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/*.zip
            release/latest*.yml
            release/latest*.yaml
          if-no-files-found: warn

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List all artifacts
        run: find dist -type f 2>/dev/null || echo "empty"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
